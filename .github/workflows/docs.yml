name: DocC

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docc:
    name: DocC build
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build documentation
        run: |
          swift package --allow-writing-to-directory ./docs-archive \
            generate-documentation --target MarkdownPDFDocumentation
