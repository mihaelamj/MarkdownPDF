name: Swift (WASM)

# Build the engine for WebAssembly (wasm32-unknown-wasip1) on every change so the
# badge reflects current WASI build health. This is a build check; running wasm
# tests needs a separate runtime and is out of scope for this gate.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Swift (WASM)
    runs-on: ubuntu-latest
    # Pinned to the patch that matches the swiftwasm 6.3-RELEASE SDK below.
    # WebAssembly .swiftmodules require an exact host-compiler match.
    container: swift:6.3.0
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift WebAssembly SDK
        run: |
          URL="https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.3-RELEASE/swift-wasm-6.3-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip"
          SUM="6704d137e532f1ac31eafedd80658f9ee61239f2b6291216a02da32361ea9dcb"
          swift sdk install "$URL" --checksum "$SUM"
      - name: Build for WebAssembly
        run: |
          swift build --swift-sdk 6.3-RELEASE-wasm32-unknown-wasip1
          swift build -c release --swift-sdk 6.3-RELEASE-wasm32-unknown-wasip1
