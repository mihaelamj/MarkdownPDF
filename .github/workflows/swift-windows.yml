name: Swift (Windows)

# Windows builds the portable rendering core (MarkdownPDF). The witness-based test
# tooling (poppler, mupdf, qpdf, verapdf) and font discovery are POSIX-only, so
# this gate compiles the core engine rather than running the full test suite.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Swift (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE
      - uses: actions/checkout@v6
      - name: Build core engine
        shell: bash
        run: swift build --target MarkdownPDF
