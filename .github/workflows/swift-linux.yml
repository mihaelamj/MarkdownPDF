name: Swift (Linux)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-linux:
    name: Swift (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          apt-get update
          apt-get install -y poppler-utils qpdf
          cd Packages && swift build && swift test
