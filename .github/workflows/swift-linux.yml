name: Swift (Linux)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-linux:
    name: Swift (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - name: Install runner tools
        run: |
          apt-get update
          apt-get install -y curl default-jre-headless fonts-dejavu-core git mupdf-tools poppler-utils qpdf unzip
          VERAPDF_VERSION=1.30.1
          curl -fsSL -o /tmp/verapdf-installer.zip "https://software.verapdf.org/rel/1.30/verapdf-greenfield-${VERAPDF_VERSION}-installer.zip"
          echo "9f03fc5da454348329f4054256351aa6c6a91683329978e8294f21fe8a5d7abc  /tmp/verapdf-installer.zip" | sha256sum -c -
          unzip -q /tmp/verapdf-installer.zip -d /tmp/verapdf-installer
          java -DINSTALL_PATH=/opt/verapdf -jar "/tmp/verapdf-installer/verapdf-greenfield-${VERAPDF_VERSION}/verapdf-izpack-installer-${VERAPDF_VERSION}.jar" -options-system
          ln -sf /opt/verapdf/verapdf /usr/local/bin/verapdf
          verapdf --version
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --depth=1 origin "refs/pull/$PR_NUMBER/merge"
          else
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout --detach FETCH_HEAD
      - name: Build and test
        env:
          MARKDOWNPDF_ARTIFACT_DIR: ${{ github.workspace }}/rendered-test-artifacts/linux
        run: |
          export MARKDOWNPDF_OPEN_FONT_PATH=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
          swift build && swift test
      - name: Upload PDF witness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdownpdf-witness-linux
          path: rendered-test-artifacts/linux
          if-no-files-found: error
