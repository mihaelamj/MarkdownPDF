name: Swift (macOS)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --depth=1 origin "refs/pull/$PR_NUMBER/merge"
          else
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout --detach FETCH_HEAD
      - name: Format, lint, build, test
        env:
          MARKDOWNPDF_ARTIFACT_DIR: ${{ github.workspace }}/rendered-test-artifacts/macos
        run: |
          brew install mupdf poppler qpdf swiftformat swiftlint verapdf
          brew install --cask font-urw-base35
          brew install --cask font-liberation
          fc-cache -f "$HOME/Library/Fonts" || true
          export MARKDOWNPDF_OPEN_FONT_PATH="$HOME/Library/Fonts/LiberationSans-Regular.ttf"
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict
          cd Packages && swift build && swift test
      - name: Upload PDF witness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdownpdf-witness-macos
          path: rendered-test-artifacts/macos
          if-no-files-found: error
